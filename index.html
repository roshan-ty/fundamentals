<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bulls & Bears fundamentals — Data-dense fundamental analysis screener for FX, Indices, Metals, and Energy.">
  <title>Bulls & Bears fundamentals</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════════════════
       HEADER
       ══════════════════════════════════════════════════════════════════════ -->
  <header style="background-color: var(--header-bg); border-bottom: 2px solid var(--border-color);">
    <div class="container py-2">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="gov-header mb-0" style="font-size: 1.4rem;">
            Bulls & Bears fundamentals
          </h1>
          <small class="gov-subheader">Fundamental Analysis Screener — FX · Indices · Metals · Energy</small>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="dark-mode-toggle" onclick="toggleDarkMode()" title="Toggle Dark Mode">
            <span id="mode-icon">🌙</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════════════════════
       NAV TABS
       ══════════════════════════════════════════════════════════════════════ -->
  <div class="container mt-3">
    <ul class="nav nav-tabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" data-tab="home" onclick="openTab('home')" type="button" role="tab">
          🏠 Home
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-tab="bias" onclick="openTab('bias')" type="button" role="tab">
          📊 BIAS Grid
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-tab="fred" onclick="openTab('fred')" type="button" role="tab">
          🏛️ Federal Reserve
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-tab="cftc" onclick="openTab('cftc')" type="button" role="tab">
          📈 CFTC CoT
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-tab="setups" onclick="openTab('setups')" type="button" role="tab">
          🎯 Trade Setups
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-tab="news" onclick="openTab('news')" type="button" role="tab">
          📰 News Feed
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-tab="ai" onclick="openTab('ai')" type="button" role="tab">
          🤖 AI Analysis
        </button>
      </li>
    </ul>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════
       TAB PANES
       ══════════════════════════════════════════════════════════════════════ -->
  <div class="container mt-3 mb-5">
    <!-- Loading Spinner -->
    <div id="loading-spinner" class="loading-spinner" style="display: none;">
      <div class="spinner"></div>
    </div>

    <!-- Error Banner -->
    <div id="error-banner" class="alert alert-warning d-none" role="alert">
      <strong>⚠️ Updating database, please refresh in a moment...</strong>
      <span id="error-details" class="d-block mt-1 small"></span>
    </div>

    <!-- 1. Home Tab -->
    <div class="tab-pane show active" id="tab-home" role="tabpanel">
      <!-- Rendered by app.js -->
    </div>

    <!-- 2. BIAS Grid Tab -->
    <div class="tab-pane" id="tab-bias" role="tabpanel">
      <!-- Rendered by app.js -->
    </div>

    <!-- 3. Federal Reserve Tab -->
    <div class="tab-pane" id="tab-fred" role="tabpanel">
      <!-- Rendered by app.js -->
    </div>

    <!-- 4. CFTC CoT Tab -->
    <div class="tab-pane" id="tab-cftc" role="tabpanel">
      <!-- Rendered by app.js -->
    </div>

    <!-- 5. Trade Setups Tab -->
    <div class="tab-pane" id="tab-setups" role="tabpanel">
      <!-- Rendered by app.js -->
    </div>

    <!-- 6. News Feed Tab -->
    <div class="tab-pane" id="tab-news" role="tabpanel">
      <!-- Rendered by app.js -->
    </div>

    <!-- 7. AI Analysis Tab -->
    <div class="tab-pane" id="tab-ai" role="tabpanel">
      <!-- Rendered by app.js -->
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════
       FOOTER
       ══════════════════════════════════════════════════════════════════════ -->
  <footer style="background-color: var(--bg-secondary); border-top: 1px solid var(--border-color); padding: 1rem 0; margin-top: 0;">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <small class="text-muted">
            Bulls & Bears fundamentals — Data sourced from FRED, CFTC, AlphaVantage, Yahoo Finance, EODHD, Newsdata.io
          </small>
        </div>
        <div>
          <small class="text-muted">
            <a href="https://shop.tradersyard.com/ref/1486/" target="_blank" rel="noopener" style="color: var(--accent-blue);">Partner: Tradersyard</a>
          </small>
        </div>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart Helpers -->
  <script src="charts.js"></script>
  <!-- Main App -->
  <script src="app.js"></script>

</body>
</html>
