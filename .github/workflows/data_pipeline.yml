name: Data Pipeline

on:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
    # Friday at 21:00 UTC (CFTC weekly update)
    - cron: '0 21 * * 5'
  workflow_dispatch:  # Manual trigger

jobs:
  run-pipeline:
    name: Run Data Pipeline & Commit JSON
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run data pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: |
          python backend/main.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "bot@bullsandbears.com"
          git config --local user.name "Bulls & Bears Bot"
          git add data/
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Auto-update: Data pipeline run $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi